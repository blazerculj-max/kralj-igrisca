<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kralj igrišča</title>
<style>
  :root{
    --bg:#0a0d14; --panel:#161d2b; --panel2:#1e2738; --ink:#f4f1e8; --muted:#8a93a5;
    --gold:#ffd166; --orange:#e8541e; --green:#2ecc71; --red:#ff4d6d; --blue:#4d8fe8; --purple:#8b5cf6;
    --line:rgba(255,255,255,.1);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Trebuchet MS',system-ui,sans-serif;
    overflow-x:hidden;user-select:none;image-rendering:pixelated;}
  #app{max-width:560px;margin:0 auto;min-height:100vh;position:relative;padding:10px;}

  /* ============ DESKTOP LAYOUT (≥900px): vse na eno stran, večje, brez scrolla ============ */
  @media (min-width:900px){
    #app{max-width:1320px;padding:18px 26px;min-height:100vh;height:100vh;display:flex;flex-direction:column;justify-content:center;}
    .screen{height:100%;display:flex;flex-direction:column;}
    /* ne-bojni zasloni (title/intro/reward/konec) centrirani */
    .screen:not(.battle):not(.oppturn){justify-content:center;}
    /* BOJ: dvostolpčni grid — levo oder (arena/score/momentum), desno roka+log */
    .screen.battle{display:grid;grid-template-columns:1.15fr 1fr;grid-template-rows:1fr;gap:26px;align-items:center;height:100%;}
    .screen.battle .bf-left{display:flex;flex-direction:column;justify-content:center;gap:14px;min-width:0;height:100%;}
    .screen.battle .bf-right{display:flex;flex-direction:column;justify-content:center;gap:14px;min-width:0;height:100%;}
    /* arena večja, zapolni levi stolpec */
    .screen.battle .arena{height:min(52vh,460px)!important;}
    .screen.oppturn .arena{height:min(48vh,420px)!important;}
    /* večji borci, koš, žoga + razmik za večjo areno */
    #app .arena .fighter{width:clamp(120px,11vw,180px);height:clamp(120px,11vw,180px);bottom:14px;}
    #app .arena .fighter.you{left:5%;} #app .arena .fighter.opp{right:5%;}
    #app .arena .hoop{top:13%;width:80px;height:14px;}
    #app .arena .net{top:13px;height:34px;}
    /* roka: karte večje in v eni vrsti */
    .screen.battle .hand{gap:13px;min-height:0;align-content:center;}
    .screen.battle .hand .card{width:clamp(120px,9.4vw,158px);height:clamp(180px,14vw,237px);}
    .screen.battle .log{max-height:130px;font-size:13px;}
    .screen.battle .mom-wrap{padding:12px 16px;}
    .screen.battle .mom-track{height:24px;}
    .screen.battle .mom-top{font-size:13px;}
    .screen.battle .mom-top .mom-val{font-size:18px;}
    /* obrambni zaslon (oppTurn) na desktopu prav tako dvostolpčno */
    .screen.oppturn{display:grid;grid-template-columns:1.15fr 1fr;gap:26px;align-items:center;height:100%;}
    .screen.oppturn .bf-left{display:flex;flex-direction:column;justify-content:center;gap:14px;}
    .screen.oppturn .bf-right{display:flex;flex-direction:column;justify-content:center;gap:14px;}
    .screen.oppturn .hand .card{width:clamp(110px,8.6vw,150px);height:clamp(165px,13vw,225px);}
    /* nagradni zaslon: večje karte, vse na sredini */
    .reward-cards .card{width:clamp(160px,13vw,210px);height:clamp(240px,19.5vw,315px);}
    .big{font-size:38px;}
    #s-title .logo{font-size:74px;} #s-title .logo2{font-size:44px;}
  }

  .hidden{display:none!important;}
  img{image-rendering:pixelated;}

  h1,h2,h3{font-family:'Arial Black','Trebuchet MS',sans-serif;margin:0;letter-spacing:.5px;}
  .big{font-size:30px;}
  .muted{color:var(--muted);}

  .btn{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:12px;
    padding:12px 18px;font-size:15px;font-weight:bold;cursor:pointer;font-family:inherit;transition:.15s;}
  .btn:hover{background:#26314a;} .btn:active{transform:scale(.97);}
  .btn.gold{background:linear-gradient(135deg,var(--gold),#e0a93a);color:#1a1206;border:none;}
  .btn.red{background:var(--red);color:#fff;border:none;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .center{text-align:center;}

  .screen{animation:fade .3s;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  /* TITLE */
  #s-title{text-align:center;padding-top:30px;}
  #s-title .logo{font-size:50px;line-height:1;color:var(--orange);text-shadow:3px 3px 0 #000,0 0 30px rgba(232,84,30,.6);}
  #s-title .logo2{font-size:30px;color:var(--gold);text-shadow:2px 2px 0 #000;margin-top:-4px;}
  #s-title .sub{color:var(--muted);margin:10px 0 30px;font-size:13px;letter-spacing:2px;}
  #s-title .hero-img{width:200px;height:200px;margin:10px auto;filter:drop-shadow(0 0 24px rgba(232,84,30,.6));}

  /* MAP */
  .map-node{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:12px 14px;margin:9px 0;cursor:pointer;transition:.15s;position:relative;overflow:hidden;}
  .map-node:hover{border-color:var(--gold);background:var(--panel2);}
  .map-node.done{opacity:.5;pointer-events:none;}
  .map-node.locked{opacity:.35;pointer-events:none;}
  .map-node.boss{border-color:var(--red);}
  .map-av{width:58px;height:58px;border-radius:10px;object-fit:cover;background:#000;border:2px solid var(--line);}
  .map-info h3{font-size:15px;} .map-info .d{font-size:12px;color:var(--muted);margin-top:2px;}
  .map-badge{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:20px;}

  /* ARENA (boj) */
  .arena{position:relative;width:100%;height:200px;border-radius:14px;overflow:hidden;
    border:2px solid var(--line);margin-bottom:10px;background:#1a1208;}
  .arena-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.85;}
  .arena-fade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,13,20,.1),rgba(10,13,20,.6));}
  .fighter{position:absolute;bottom:8px;width:92px;height:92px;object-fit:contain;transition:transform .25s;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.6));}
  .fighter.you{left:14px;transform:scaleX(1);}
  .fighter.opp{right:14px;}
  .fighter.shoot{animation:shootPose .5s;}
  @keyframes shootPose{0%{transform:translateY(0);}40%{transform:translateY(-14px) scale(1.06);}100%{transform:translateY(0);}}
  .fighter.hurt{animation:hurtShake .4s;}
  @keyframes hurtShake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px) rotate(-3deg);}75%{transform:translateX(6px) rotate(3deg);}}
  .fighter.celebrate{animation:celebrate .6s;}
  @keyframes celebrate{0%,100%{transform:translateY(0);}30%{transform:translateY(-16px);}60%{transform:translateY(0);}80%{transform:translateY(-8px);}}

  /* žoga */
  /* koš + mreža */
  .hoop{position:absolute;top:42px;left:50%;transform:translateX(-50%);width:54px;height:10px;
    background:var(--orange);border-radius:3px;z-index:3;box-shadow:0 0 8px rgba(232,84,30,.6);}
  .net{position:absolute;top:9px;left:6px;right:6px;height:22px;
    background:repeating-linear-gradient(90deg,rgba(255,255,255,.5) 0 2px,transparent 2px 6px),
    repeating-linear-gradient(180deg,rgba(255,255,255,.4) 0 2px,transparent 2px 7px);
    clip-path:polygon(0 0,100% 0,82% 100%,18% 100%);transform-origin:top center;}
  .net.swish{animation:netSwish .6s;}
  @keyframes netSwish{0%{transform:scaleY(1);}30%{transform:scaleY(1.4) scaleX(.9);}60%{transform:scaleY(.85);}100%{transform:scaleY(1);}}

  /* iskre ob košu */
  .sparks{position:absolute;top:50px;left:50%;transform:translateX(-50%);z-index:6;pointer-events:none;}
  .spark{position:absolute;width:6px;height:6px;border-radius:50%;background:var(--gold);opacity:0;}
  .sparks.burst .spark{animation:sparkFly .6s ease-out forwards;}
  @keyframes sparkFly{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.3);}}

  /* ogenj aura ob vroči roki */
  .fire-aura{position:absolute;bottom:6px;left:8px;font-size:26px;z-index:4;animation:fireFlick .5s infinite alternate;pointer-events:none;}
  @keyframes fireFlick{0%{transform:scale(1) translateY(0);opacity:.9;}100%{transform:scale(1.15) translateY(-3px);opacity:1;}}

  /* screen shake */
  .arena.shake{animation:shake .4s;}
  @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-7px);}40%{transform:translateX(7px);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}

  /* combo */
  .combo-badge{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:7;
    font-family:'Arial Black';font-size:18px;color:var(--gold);text-shadow:2px 2px 0 #000;opacity:0;}
  .combo-badge.go{animation:comboPop .9s;}
  @keyframes comboPop{0%{opacity:0;transform:translateX(-50%) scale(.4);}30%{opacity:1;transform:translateX(-50%) scale(1.2);}100%{opacity:0;transform:translateX(-50%) scale(1) translateY(-14px);}}

  .ball{position:absolute;width:24px;height:24px;font-size:24px;line-height:24px;text-align:center;z-index:5;pointer-events:none;opacity:0;}
  .ball.fly-you{animation:flyYou .7s ease-out forwards;}
  @keyframes flyYou{0%{opacity:1;left:50px;bottom:60px;transform:scale(1);}100%{opacity:1;right:60px;left:auto;bottom:120px;transform:scale(.7);}}
  .ball.fly-opp{animation:flyOpp .7s ease-out forwards;}
  @keyframes flyOpp{0%{opacity:1;right:50px;bottom:60px;}100%{opacity:1;left:60px;right:auto;bottom:120px;transform:scale(.7);}}

  /* points popup */
  .pts-pop{position:absolute;top:30%;font-family:'Arial Black';font-size:40px;z-index:8;opacity:0;pointer-events:none;text-shadow:3px 3px 0 #000;}
  .pts-pop.go{animation:ptsPop 1.1s forwards;}
  @keyframes ptsPop{0%{opacity:0;transform:translateY(10px) scale(.4);}25%{opacity:1;transform:translateY(-10px) scale(1.2);}80%{opacity:1;transform:translateY(-30px);}100%{opacity:0;transform:translateY(-50px);}}

  /* SCOREBOARD */
  .scoreboard{display:flex;align-items:stretch;gap:8px;margin-bottom:10px;}
  .score-side{flex:1;background:var(--panel);border:2px solid var(--line);border-radius:12px;padding:8px;text-align:center;}
  .score-side.you{border-color:var(--blue);} .score-side.opp{border-color:var(--red);}
  .score-side .nm{font-size:12px;color:var(--muted);font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .score-side .pts{font-size:38px;font-family:'Arial Black';line-height:1;}
  .score-side.you .pts{color:var(--blue);} .score-side.opp .pts{color:var(--red);}
  .score-side .pts.bump{animation:bump .4s;}
  @keyframes bump{0%,100%{transform:scale(1);}40%{transform:scale(1.4);color:var(--gold);}}
  .score-mid{display:flex;flex-direction:column;align-items:center;justify-content:center;width:48px;}
  .score-mid .to{font-size:10px;color:var(--muted);} .score-mid .t21{font-family:'Arial Black';font-size:20px;color:var(--gold);}
  .fauls{display:flex;gap:2px;justify-content:center;margin-top:4px;}
  .faul-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.15);}
  .faul-dot.on{background:var(--red);}

  .poss-bar{text-align:center;padding:7px;background:var(--panel);border-radius:10px;margin-bottom:10px;font-size:13px;}
  .poss-bar b{color:var(--gold);}

  /* MOMENTUM METER */
  .mom-wrap{background:var(--panel);border-radius:12px;padding:9px 12px;margin-bottom:10px;border:1px solid var(--line);}
  .mom-top{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:bold;letter-spacing:.5px;}
  .mom-top .mom-val{font-family:'Arial Black';font-size:15px;}
  .mom-stage{font-family:'Arial Black';font-size:12px;letter-spacing:.5px;}
  .mom-track{position:relative;height:18px;border-radius:9px;background:rgba(255,255,255,.08);overflow:hidden;}
  .mom-fill{position:absolute;inset:0;width:0;border-radius:9px;transition:width .55s cubic-bezier(.34,1.4,.5,1);
    background:linear-gradient(90deg,var(--blue),var(--gold),var(--orange));}
  .mom-fill.hot{box-shadow:0 0 14px rgba(232,84,30,.8);animation:momPulse 1s infinite alternate;}
  @keyframes momPulse{0%{filter:brightness(1);}100%{filter:brightness(1.3);}}
  .mom-ticks{position:absolute;inset:0;pointer-events:none;}
  .mom-tick{position:absolute;top:0;bottom:0;width:2px;background:rgba(10,13,20,.45);}
  .mom-gain{animation:momFlash .5s;}
  @keyframes momFlash{0%{transform:scale(1);}40%{transform:scale(1.03);}100%{transform:scale(1);}}
  /* opponent momentum (manjši, rdeč) */
  .mom-wrap.opp .mom-fill{background:linear-gradient(90deg,#6b1f2e,var(--red),#ff8fa3);}
  .mom-wrap.opp .mom-fill.hot{box-shadow:0 0 14px rgba(255,77,109,.8);}
  /* gumb za met — pokaže trenutno verjetnost */
  .shot-hint{font-size:11px;color:var(--muted);margin-top:3px;}
  .shot-hint b{color:var(--gold);}
  .energy{display:inline-flex;gap:4px;margin-left:6px;vertical-align:middle;}
  .e-pip{width:18px;height:18px;color:var(--gold);filter:drop-shadow(0 0 4px rgba(255,209,102,.7));display:inline-flex;}
  .e-pip.spent{color:rgba(255,255,255,.15);filter:none;}

  .intent{background:rgba(255,77,109,.12);border:1px solid var(--red);border-radius:12px;padding:10px;
    margin-bottom:10px;text-align:center;font-size:14px;}
  .intent b{color:var(--red);}
  .intent.pulse{animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.65;}}

  /* HAND */
  .hand{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-top:8px;min-height:205px;}
  /* === KARTA: full-bleed ilustracija, večja === */
  .card{width:130px;height:195px;border-radius:14px;cursor:pointer;position:relative;transition:transform .15s,box-shadow .15s;
    overflow:hidden;background:#0d1119;border:3px solid #2a3344;
    box-shadow:0 5px 14px rgba(0,0,0,.55),inset 0 0 0 1px rgba(255,255,255,.06);}
  .card:hover{transform:translateY(-14px) scale(1.04);z-index:20;box-shadow:0 16px 30px rgba(0,0,0,.6),0 0 20px rgba(255,209,102,.35);}
  .card.unplayable{opacity:.5;filter:grayscale(.65);cursor:not-allowed;}
  .card.unplayable:hover{transform:none;box-shadow:0 5px 14px rgba(0,0,0,.55);}
  /* tip = barva spodnjega traku/obrobe */
  .card.attack{--ctype:#ff5a47;} .card.defense{--ctype:#4d9fe8;} .card.strategy{--ctype:#b07cf0;}
  .card.played{animation:cardPlay .5s forwards;}
  @keyframes cardPlay{0%{transform:translateY(0) scale(1);opacity:1;}100%{transform:translateY(-90px) scale(.5) rotate(8deg);opacity:0;}}

  /* polna ilustracija */
  .card-art-wrap{position:absolute;inset:0;background:#0d1119;}
  .card-art{width:100%;height:100%;object-fit:cover;object-position:center 20%;}
  .card-art-fb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:60px;
    background:radial-gradient(circle at 50% 35%,#1e2738,#0a0d14);}
  /* temni preliv na dnu za berljivost besedila */
  .card-grad{position:absolute;left:0;right:0;bottom:0;height:60%;pointer-events:none;
    background:linear-gradient(180deg,transparent,rgba(8,10,16,.6) 40%,rgba(8,10,16,.96) 100%);}
  /* barvni rob tipa na dnu */
  .card-typebar{position:absolute;left:0;right:0;bottom:0;height:5px;background:var(--ctype,#888);box-shadow:0 0 8px var(--ctype,#888);}

  /* cena (žeton zgoraj levo) */
  .card-cost{position:absolute;top:6px;left:6px;width:30px;height:30px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#ffe49a,var(--gold));color:#1a1206;font-family:'Arial Black';font-size:16px;
    display:flex;align-items:center;justify-content:center;border:2.5px solid #1a1206;z-index:4;
    box-shadow:0 2px 5px rgba(0,0,0,.6);}
  /* count / odds badge zgoraj desno */
  .card-x{position:absolute;top:6px;right:6px;background:var(--orange);color:#fff;border-radius:9px;
    min-width:26px;height:24px;padding:0 6px;display:flex;align-items:center;justify-content:center;font-size:13px;
    font-weight:bold;font-family:'Arial Black';border:2px solid #1a1206;z-index:4;box-shadow:0 2px 4px rgba(0,0,0,.5);}
  /* ime karte — enotno, nad učinkom */
  .card-nm{position:absolute;left:6px;right:6px;bottom:46px;z-index:3;
    font-family:'Arial Black';font-size:12px;text-align:center;line-height:1.0;color:#e9edf4;
    text-shadow:0 1px 0 #000,0 0 6px rgba(0,0,0,.95);letter-spacing:.2px;text-transform:uppercase;}
  /* VELIK glavni učinek — takoj jasno kaj karta dela */
  .card-eff{position:absolute;left:4px;right:4px;bottom:23px;z-index:3;
    font-family:'Arial Black';font-size:18px;text-align:center;line-height:1;color:var(--gold);
    text-shadow:0 2px 0 #000,0 0 10px rgba(0,0,0,.9);letter-spacing:.3px;}
  /* drobna razlaga */
  .card-desc{position:absolute;left:5px;right:5px;bottom:9px;z-index:3;
    font-size:9.5px;text-align:center;line-height:1.1;color:#aeb8c8;
    text-shadow:0 1px 2px rgba(0,0,0,.95);}
  .card-type{display:none;}

  /* reward karte malo večji teksti */
  .reward-cards .card-nm{font-size:13px;bottom:54px;} .reward-cards .card-eff{font-size:22px;bottom:27px;}
  .reward-cards .card-desc{font-size:10.5px;bottom:11px;}
  .reward-cards .card-cost{top:20px;} .reward-cards .rar-gem{top:22px;}

  .end-poss{text-align:center;margin-top:10px;}
  .log{background:var(--panel);border-radius:10px;padding:7px 11px;margin-top:10px;font-size:12px;
    max-height:74px;overflow-y:auto;color:var(--muted);}
  .log div{margin:2px 0;animation:fade .3s;}
  .log .hit{color:var(--green);} .log .miss{color:var(--red);} .log .info{color:var(--gold);}

  .reward-cards{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin:18px 0;}
  .reward-cards .card{width:150px;height:225px;}
  .reward-cards .card:hover{transform:translateY(-14px) scale(1.05);}

  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#000;color:#fff;
    padding:11px 20px;border-radius:30px;font-weight:bold;opacity:0;transition:.3s;z-index:100;pointer-events:none;border:1px solid var(--gold);}
  #toast.show{opacity:1;}

  /* ===== FAZNI TRAK ===== */
  .phase-banner{text-align:center;font-family:'Arial Black';font-size:15px;letter-spacing:1px;
    padding:9px;border-radius:10px;margin-bottom:10px;text-transform:uppercase;}
  .phase-banner.attack{background:linear-gradient(90deg,#7a2e0e,#e8541e,#ffb84d);color:#1a1206;
    box-shadow:0 0 16px rgba(232,84,30,.5);}
  .phase-banner.defense{background:linear-gradient(90deg,#1a3a6b,#4d8fe8,#7fb3f0);color:#fff;
    box-shadow:0 0 16px rgba(77,143,232,.5);}

  /* ===== OBRAMBNA PRIPRAVA ===== */
  .def-prep{background:rgba(77,143,232,.08);border:1px solid rgba(77,143,232,.3);border-radius:10px;
    padding:9px 11px;margin-top:10px;}
  .dp-title{font-family:'Arial Black';font-size:11px;color:#7fb3f0;letter-spacing:.5px;margin-bottom:7px;}
  .dp-slots{display:flex;gap:8px;margin-bottom:8px;}
  .prep-slot{flex:1;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;gap:5px;
    font-size:18px;cursor:pointer;transition:.15s;}
  .prep-slot.empty{border:1.5px dashed rgba(255,255,255,.2);color:var(--muted);font-size:11px;}
  .prep-slot.filled{background:rgba(77,143,232,.25);border:1.5px solid #4d8fe8;}
  .prep-slot.filled span{font-size:10px;color:#cdd5e2;}
  .prep-slot.filled:hover{background:rgba(255,77,109,.2);border-color:var(--red);}
  .dp-sys{display:flex;gap:8px;}
  .sys-btn{flex:1;padding:8px;border-radius:8px;background:var(--panel2);border:1.5px solid var(--line);
    color:var(--ink);font-size:11px;font-weight:bold;cursor:pointer;transition:.15s;font-family:inherit;}
  .sys-btn:hover{background:#26314a;}
  .sys-btn.on{background:linear-gradient(135deg,#2471a3,#4d8fe8);border-color:#7fb3f0;color:#fff;box-shadow:0 0 10px rgba(77,143,232,.4);}
  .dp-sysdesc{font-size:10px;color:var(--muted);text-align:center;margin-top:6px;font-style:italic;}

  /* oznaka "pripravi" na obrambnih kartah v napadu */
  .prep-tag{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);z-index:5;
    background:#4d8fe8;color:#fff;font-size:9px;font-weight:bold;padding:2px 7px;border-radius:6px;
    letter-spacing:.5px;border:1px solid #1a1206;}
  .card.chosen{outline:3px solid var(--gold);outline-offset:-1px;box-shadow:0 0 18px rgba(255,209,102,.6)!important;}

  /* ===== NAPADALNI SKOK ===== */
  .rebound-box{background:rgba(255,209,102,.1);border:2px solid var(--gold);border-radius:12px;
    padding:12px;text-align:center;margin-top:10px;animation:fade .3s;}
  .rb-title{font-family:'Arial Black';font-size:16px;color:var(--gold);}
  .rb-chance{font-size:13px;color:var(--muted);margin:4px 0 10px;}

  /* oznaka redkosti — svetleč dragulj zgoraj desno (pod/poleg cost), na full-bleed karti */
  .rar-gem{position:absolute;top:7px;right:50%;transform:translateX(50%) rotate(45deg);width:12px;height:12px;border-radius:3px;
    border:1.5px solid rgba(0,0,0,.6);z-index:4;box-shadow:0 0 8px currentColor,0 0 14px currentColor;}
  .reward-cards .rar-gem{width:15px;height:15px;top:9px;}
  /* legendarni leskeč na reward kartah */
  @keyframes legGlow{0%,100%{filter:brightness(1);}50%{filter:brightness(1.25);}}
  .card.leg{animation:legGlow 1.4s infinite;}

  /* ============ VIZUALNE NADGRADNJE ============ */

  /* --- SCREEN FLASH (ob košu / ognju) --- */
  #flash{position:fixed;inset:0;pointer-events:none;z-index:90;opacity:0;}
  #flash.go{animation:flashGo .45s ease-out;}
  @keyframes flashGo{0%{opacity:0;}15%{opacity:.55;}100%{opacity:0;}}
  #flash.gold{background:radial-gradient(circle at 50% 45%,rgba(255,209,102,.9),transparent 65%);}
  #flash.fire{background:radial-gradient(circle at 50% 50%,rgba(232,84,30,.9),rgba(255,77,0,.4) 40%,transparent 70%);}
  #flash.blue{background:radial-gradient(circle at 50% 45%,rgba(77,143,232,.8),transparent 65%);}

  /* --- CRT / SCANLINE OVERLAY (retro 16-bit) --- */
  #crt{position:fixed;inset:0;pointer-events:none;z-index:80;mix-blend-mode:overlay;opacity:.5;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.18) 0px,rgba(0,0,0,.18) 1px,transparent 2px,transparent 3px);}
  #crt::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,.35) 100%);}
  body.no-crt #crt{display:none;}

  /* --- boljše ISKRE (več, večje, raznobarvne) --- */
  @keyframes sparkFly2{0%{opacity:1;transform:translate(0,0) scale(1.3) rotate(0deg);}
    100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.2) rotate(var(--rot));}}

  /* --- CARD DRAW (karte se razprejo v roko) --- */
  @keyframes cardDraw{0%{opacity:0;transform:translateY(60px) scale(.7) rotate(-8deg);}
    60%{opacity:1;}100%{opacity:1;transform:translateY(0) scale(1) rotate(0deg);}}
  .card.dealing{animation:cardDraw .4s cubic-bezier(.2,.9,.3,1.2) backwards;}

  /* --- PHASE SWIPE (prehod napad↔obramba) --- */
  #swipe{position:fixed;inset:0;z-index:95;pointer-events:none;display:flex;align-items:center;justify-content:center;
    opacity:0;}
  #swipe.go{animation:swipeGo 1s ease-in-out;}
  @keyframes swipeGo{0%{opacity:0;transform:scaleX(0);}15%{opacity:1;transform:scaleX(1);}
    85%{opacity:1;transform:scaleX(1);}100%{opacity:0;transform:scaleX(1.1);}}
  #swipe .swipe-txt{font-family:'Arial Black';font-size:44px;letter-spacing:3px;text-transform:uppercase;
    color:#fff;text-shadow:0 4px 0 rgba(0,0,0,.5),0 0 30px currentColor;transform:skewX(-8deg);}
  #swipe.attack{background:linear-gradient(120deg,rgba(122,46,14,.96),rgba(232,84,30,.96),rgba(255,184,77,.96));}
  #swipe.defense{background:linear-gradient(120deg,rgba(26,58,107,.96),rgba(77,143,232,.96),rgba(127,179,240,.96));}

  /* --- animiran MOMENTUM ogenj pri visokih vrednostih --- */
  .mom-fill.hot::after{content:'';position:absolute;inset:0;border-radius:9px;
    background:repeating-linear-gradient(90deg,transparent,rgba(255,255,255,.35) 8px,transparent 16px);
    animation:momFlames .6s linear infinite;}
  @keyframes momFlames{0%{background-position:0 0;}100%{background-position:32px 0;}}

  /* --- gumb za CRT toggle --- */
  .crt-toggle{position:fixed;bottom:10px;right:10px;z-index:100;font-size:11px;padding:5px 9px;
    background:rgba(20,25,38,.85);border:1px solid var(--line);border-radius:7px;color:var(--muted);cursor:pointer;}

  /* --- INLINE IKONE (game-icons.net) --- */
  .icn{width:1em;height:1em;display:inline-block;vertical-align:-0.12em;fill:currentColor;}
  .icn.big{width:1.4em;height:1.4em;vertical-align:-0.22em;}
</style>
</head>
<body>
<div id="app"><div id="screen"></div></div>
<div id="toast"></div>
<div id="flash"></div>
<div id="swipe"><div class="swipe-txt"></div></div>
<div id="crt"></div>
<div class="crt-toggle" onclick="document.body.classList.toggle('no-crt')">📺 CRT</div>

function icn(name,cls){return `<svg class="icn ${cls||''}" viewBox="0 0 512 512" aria-hidden="true"><path fill="currentColor" d="${ICN[name]||''}"/></svg>`;}
const screen=$('screen');
function chance(p){return Math.random()<p;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ---------- MOMENTUM ---------- */
const MOM_MAX=100;
/* met verjetnost = base + atk + bonus(momentum) - def - readPenalty.
   bonus raste z momentumom: pri 0 mom = 0, pri 100 mom = +0.45 (skoraj zihr met). */
function momBonus(m){ return (m/MOM_MAX)*0.45; }
function momStage(m){
  if(m>=85) return {nm:'V OGNJU',  col:'var(--orange)', ic:'🔥'};
  if(m>=55) return {nm:'VROČ',     col:'var(--gold)',   ic:'🌡'};
  if(m>=25) return {nm:'TOPEL',    col:'var(--blue)',   ic:'📈'};
  return            {nm:'MRZEL',    col:'var(--muted)',  ic:'❄'};
}
function addMom(who,amt){
  if(who==='you'){ G.momentum=clamp(G.momentum+amt,0,MOM_MAX); }
  else           { G.oppMom =clamp(G.oppMom +amt,0,MOM_MAX); }
}
/* meter HTML; side='you'|'opp' */
function momHtml(side){
  const m = side==='you'?G.momentum:G.oppMom;
  const st=momStage(m);
  const hot = m>=85?'hot':'';
  const ticks=[25,55,85].map(t=>`<div class="mom-tick" style="left:${t}%"></div>`).join('');
  const lbl = side==='you'?'TVOJ MOMENTUM':`MOMENTUM · ${G.opp.nm}`;
  return `<div class="mom-wrap ${side==='opp'?'opp':''}">
    <div class="mom-top"><span>${lbl}</span>
      <span class="mom-stage" style="color:${st.col}">${st.ic} ${st.nm} · <span class="mom-val">${Math.round(m)}</span></span></div>
    <div class="mom-track"><div class="mom-fill ${hot}" id="mom-fill-${side}" style="width:${m}%"></div>
      <div class="mom-ticks">${ticks}</div></div>
  </div>`;
}
let _tt;function toast(m){const t=$('toast');t.innerHTML=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),1500);}

/* enotna vsebina karte (ilustracija zgoraj + info spodaj). fallback na emoji če slika manjka */
function cardInner(id, count){
  const c=CARD_DEFS[id];
  const badge=count>1?`<div class="card-x">×${count}</div>`:'';
  const img=c.img?`<img class="card-art" src="${c.img}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
    <div class="card-art-fb" style="display:none">${c.ic}</div>`
    :`<div class="card-art-fb" style="display:flex">${c.ic}</div>`;
  const rar=c.rarity||'navadna';
  const rs=RARITY_STYLE[rar];
  const rarBadge = rar!=='navadna' ? `<div class="rar-gem" style="color:${rs.col};background:${rs.col}" title="${rs.lbl}"></div>` : '';
  return `<div class="card-art-wrap">${img}</div>
    <div class="card-grad"></div>
    <div class="card-cost">${c.cost}</div>${badge}${rarBadge}
    <div class="card-nm">${c.nm}</div>
    <div class="card-eff">${c.eff||''}</div>
    <div class="card-desc">${c.desc}</div>
    <div class="card-typebar"></div>`;
}

function beginBattle(oppIdx){
  const opp=OPPONENTS[oppIdx];
  G={opp,oppIdx,youScore:0,oppScore:0,target:21,deck:shuffle([...RUN.deck]),hand:[],discard:[],
     energy:0,maxEnergy:3,hotHand:0,fastBreak:false,youFauls:0,oppFauls:0,possession:'you',log:[],over:false,_react:[],
     combo:0, assist:0, recentShots:[], oppStep:0, pendingAttack:null, oppReboundCount:0,
     momentum:0, oppMom:0, nextShotBonus:0, onFireBomb:false,
     shotTaken:false, reboundCount:0, hasRebound:false,
     defPrep:[], defSystem:null};
  startPossession('you');
}
function drawCards(n){
  for(let i=0;i<n;i++){
    if(G.deck.length===0){ if(G.discard.length===0)break; G.deck=shuffle(G.discard); G.discard=[]; }
    G.hand.push(G.deck.pop());
  }
  if(n>=5) G._freshHand=true; // animiraj draw samo ob novi roki
}
function logMsg(m,c){ G.log.unshift(`<div class="${c||''}">${m}</div>`); if(G.log.length>5)G.log.pop(); }

function startPossession(who){
  G.possession=who; G.hotHand=0; G.fastBreak=(who==='you'&&G.fastBreak); G._react=[]; G.combo=0;
  G.nextShotBonus=0; G.onFireBomb=false;
  // momentum se DELNO ohrani med posestmi (×0.6) → topla/hladna serija skozi tekmo
  G.momentum=Math.round(G.momentum*0.6);
  G.oppMom  =Math.round(G.oppMom*0.6);
  if(who==='you'){
    G.energy=G.maxEnergy; G.discard.push(...G.hand); G.hand=[]; drawCards(5);
    G.shotTaken=false; G.reboundCount=0; G.hasRebound=false;
    logMsg('🏀 Tvoja žoga — gradi momentum, nato vrži (1 met!).','info');
    phaseSwipe('attack', renderBattle);
  } else {
    // OBRAMBA: pripravljene karte iz defPrep gredo v _react, sistem ostane izbran
    G.discard.push(...G.hand); G.hand=[];
    G._react=[];
    drawCards(5);
    if(!G.defSystem) G.defSystem='osebna'; // privzeto če nisi izbral
    logMsg(`🛡 ${G.opp.nm} ima žogo — ${DEF_SYSTEMS[G.defSystem].ic} ${DEF_SYSTEMS[G.defSystem].nm} obramba!`,'info');
    phaseSwipe('defense', oppPossession);
  }
}

/* živa verjetnost meta (z momentumom) — uporabljeno za prikaz % in resolveShot */
function shotProb(c){
  const shotBonus=(G.nextShotBonus||0);
  if(c.fixedP) return clamp(c.base+shotBonus,0.05,0.97);
  let readPenalty=0;
  const rs=G.recentShots, id=Object.keys(CARD_DEFS).find(k=>CARD_DEFS[k]===c);
  if(rs.length>=2 && rs[rs.length-1]===id && rs[rs.length-2]===id) readPenalty=G.opp.reads;
  let p=clamp(c.base+HERO_STATS.atk+momBonus(G.momentum)+shotBonus-G.opp.def-readPenalty,0.05,0.97);
  if(c.spec==='royal' && G.momentum>=70) p=1;
  return p;
}

function canPlay(id){
  const c=CARD_DEFS[id];
  if(c.type==='defense'){ return G.energy>=c.cost && G.defPrep.length<2; } // pripravi v slot
  if(G.energy<c.cost)return false;
  if(c.requiresFast&&!G.fastBreak)return false;
  // po metu (brez skoka) ne moreš več napadati ali graditi
  if(G.shotTaken && !G.hasRebound)return false;
  return true;
}

/* animacije */
function animShoot(who){const f=$(who==='you'?'f-you':'f-opp');if(f){f.classList.add('shoot');setTimeout(()=>f.classList.remove('shoot'),500);}
  const ball=$('ball');if(ball){ball.className='ball';void ball.offsetWidth;ball.classList.add(who==='you'?'fly-you':'fly-opp');}}
function animScore(who){const f=$(who==='you'?'f-you':'f-opp');if(f){f.classList.add('celebrate');setTimeout(()=>f.classList.remove('celebrate'),600);}
  const other=$(who==='you'?'f-opp':'f-you');if(other){other.classList.add('hurt');setTimeout(()=>other.classList.remove('hurt'),400);}
  const pe=$(who==='you'?'you-pts':'opp-pts');if(pe){pe.classList.add('bump');setTimeout(()=>pe.classList.remove('bump'),400);}
  // mreža zaniha + iskre
  const net=$('net');if(net){net.classList.add('swish');setTimeout(()=>net.classList.remove('swish'),600);}
  burstSparks();}
function burstSparks(){const s=$('sparks');if(!s)return;s.innerHTML='';for(let i=0;i<16;i++){const sp=document.createElement('div');sp.className='spark';const ang=Math.random()*Math.PI*2,dist=28+Math.random()*55;sp.style.setProperty('--dx',(Math.cos(ang)*dist).toFixed(0)+'px');sp.style.setProperty('--dy',(Math.sin(ang)*dist).toFixed(0)+'px');sp.style.setProperty('--rot',(Math.random()*720-360).toFixed(0)+'deg');sp.style.animationName='sparkFly2';const col=['#ffd166','#ffb84d','#e8541e','#fff'][i%4];sp.style.background=col;sp.style.boxShadow='0 0 6px '+col;s.appendChild(sp);}void s.offsetWidth;s.classList.add('burst');setTimeout(()=>s.classList.remove('burst'),700);}
/* bliskovit flash čez ekran: 'gold'|'fire'|'blue' */
function screenFlash(kind){const f=$('flash');if(!f)return;f.className='';void f.offsetWidth;f.classList.add(kind||'gold','go');setTimeout(()=>f.className='',500);}
/* prehod faze: 'attack'|'defense' z napisom */
function phaseSwipe(kind,cb){const s=$('swipe');if(!s){if(cb)cb();return;}
  s.querySelector('.swipe-txt').textContent=kind==='attack'?'🔥 NAPAD':'🛡 OBRAMBA';
  s.querySelector('.swipe-txt').style.color=kind==='attack'?'#ffb84d':'#7fb3f0';
  s.className='';void s.offsetWidth;s.classList.add(kind,'go');
  setTimeout(()=>{if(cb)cb();},480);
  setTimeout(()=>s.className='',1000);}
function shakeArena(){const a=$('arena');if(a){a.classList.add('shake');setTimeout(()=>a.classList.remove('shake'),400);}}
function comboFlash(n){const a=$('arena');if(!a)return;const b=document.createElement('div');b.className='combo-badge';b.textContent=n+'× COMBO!';a.appendChild(b);void b.offsetWidth;b.classList.add('go');setTimeout(()=>b.remove(),900);}
function ptsPopup(txt,color,side){const p=$('pts-pop');if(!p)return;p.textContent=txt;p.style.color=color;p.style[side]=side==='left'?'30px':'auto';if(side==='right')p.style.right='30px';p.style[side==='left'?'right':'left']='auto';p.className='pts-pop';void p.offsetWidth;p.classList.add('go');}

function playCard(idx){
  const id=G.hand[idx];if(!id||!canPlay(id))return;
  const c=CARD_DEFS[id];
  // Timeout zahteva izbiro PRED igranjem — pokaži mini meni
  if(c.spec==='timeout'){ promptTimeout(idx); return; }
  // OBRAMBNE karte se med napadom NE igrajo — gredo v "pripravi obrambo" slot
  if(c.type==='defense'){ prepDefense(idx); return; }
  // če si že vrgel in nimaš skoka → ne moreš več napadati
  if(G.shotTaken && !G.hasRebound && c.type==='attack'){
    toast('Že si vrgel! Ujemi skok ali končaj napad.'); return;
  }
  G.energy-=c.cost;
  const cardEl=document.querySelector(`#hand .card[data-idx="${idx}"]`);
  if(cardEl)cardEl.classList.add('played');
  G.hand.splice(idx,1);G.discard.push(id);

  setTimeout(()=>{
    if(c.type==='strategy'){
      if(c.spec==='refresh'){
        G.energy=clamp(G.energy+2,0,99); addMom('you',-10);
        logMsg('🔋 Drugi val! +2⚡, momentum −10.','info');
      } else if(c.spec==='onfire'){
        G.momentum=100; G.onFireBomb=true;
        logMsg('⚡ V OGNJU! Momentum 100 — naslednji met je bomba!','info'); shakeArena(); screenFlash('fire');
      } else if(c.spec==='pickroll'){
        addMom('you', c.mom||0); G.nextShotBonus=(G.nextShotBonus||0)+0.08;
        logMsg(`🤝 Pick & Roll! +${c.mom} mom, naslednji met +8%.`,'info');
      } else {
        addMom('you', c.mom||0);
        logMsg(`${c.ic} ${c.nm}! +${c.mom} momentuma`,'info');
      }
      if(c.buildRisk && chance(c.buildRisk)){
        logMsg(`✋ ${G.opp.nm} prestreže podajo! Žoga izgubljena.`,'miss'); shakeArena();
        G.combo=0; checkWin();
        if(!G.over){ renderBattle(); setTimeout(()=>startPossession('opp'),900); }
        return;
      }
    }
    else if(c.type==='attack'){ resolveShot(c,id); return; } // resolveShot sam upravlja konec posesti
    if(c.requiresFast)G.fastBreak=false;
    checkWin();
    if(!G.over){ renderBattle(); }
  }, cardEl?320:0);
}

/* pripravi obrambno karto v slot (med napadom) */
function prepDefense(idx){
  const id=G.hand[idx]; const c=CARD_DEFS[id];
  if(G.energy<c.cost){ toast('Premalo energije'); return; }
  if(G.defPrep.length>=2){ toast('Slot poln (max 2)'); return; }
  G.energy-=c.cost;
  G.defPrep.push(id);
  G.hand.splice(idx,1);
  logMsg(`${c.ic} ${c.nm} pripravljena za obrambo!`,'info');
  renderBattle();
}

/* Timeout: izbira med +svoj / −njegov momentum */
function promptTimeout(idx){
  const oppHas=G.oppMom>0;
  screen.innerHTML=`<div class="screen oppturn">
    <div class="bf-left">
      ${arenaHtml()}
      ${scoreboardHtml()}
      ${momHtml('you')}
    </div>
    <div class="bf-right">
      <div class="intent"><b>🧊 TIMEOUT</b><div style="font-size:12px;color:var(--muted);margin-top:6px">Izberi učinek:</div></div>
      <div class="btn-row" style="margin-top:6px">
        <button class="btn gold" onclick="resolveTimeout(${idx},'self')">📈 +25 svojega momentuma</button>
        <button class="btn red" onclick="resolveTimeout(${idx},'opp')" ${oppHas?'':'disabled'}>📉 −30 njegovega ${oppHas?'':'(nima)'}</button>
      </div>
      <div class="center" style="margin-top:10px"><button class="btn" style="font-size:12px;padding:7px 12px" onclick="renderBattle()">↩ Prekliči</button></div>
      <div class="log">${G.log.join('')||''}</div>
    </div>
  </div>`;
}
function resolveTimeout(idx,mode){
  const id=G.hand[idx]; if(!id)return; const c=CARD_DEFS[id];
  G.energy-=c.cost; G.hand.splice(idx,1); G.discard.push(id);
  if(mode==='self'){ addMom('you',25); logMsg('🧊 Timeout: +25 tvojega momentuma.','info'); }
  else { addMom('opp',-30); logMsg(`🧊 Timeout: ohladil si ${G.opp.nm} (−30 momentuma)!`,'info'); }
  checkWin();
  if(!G.over){ if(G.energy<=0){renderBattle();setTimeout(endPossession,800);} else renderBattle(); }
}

function resolveShot(c, id){
  let readPenalty=0;
  const rs=G.recentShots;
  if(rs.length>=2 && rs[rs.length-1]===id && rs[rs.length-2]===id){
    readPenalty=G.opp.reads;
    logMsg(`👁 ${G.opp.nm} bere tvoj vzorec! (-${Math.round(readPenalty*100)}%)`,'miss');
  }
  const momAtShot=G.momentum;
  const shotBonus=(G.nextShotBonus||0); G.nextShotBonus=0;
  let p;
  if(c.fixedP){ p=clamp(c.base+shotBonus,0.05,0.97); }
  else        { p=clamp(c.base+HERO_STATS.atk+momBonus(momAtShot)+shotBonus-G.opp.def-readPenalty,0.05,0.97); }
  let royalGuaranteed=false;
  if(c.spec==='royal' && momAtShot>=70){ p=1; royalGuaranteed=true; }
  let bomb=false;
  if(G.onFireBomb){ p=clamp(p+0.40,0.05,0.99); bomb=true; G.onFireBomb=false; }
  if(c.mom) addMom('you', c.mom);
  G.recentShots.push(id); if(G.recentShots.length>4)G.recentShots.shift();
  G.energy-=c.cost; G.hand.splice(G.hand.indexOf(id),1); G.discard.push(id);
  G.shotTaken=true; G.hasRebound=false;
  animShoot('you');
  renderBattle();
  setTimeout(()=>{
    if(chance(p)){
      G.youScore+=c.pts;G.combo++;
      const tag = royalGuaranteed?' 👑 ZAGOTOVLJENO':bomb?' ⚡ BOMBA':(momAtShot>=25?` · 🔥${Math.round(momBonus(momAtShot)*100)}% od momentuma`:'');
      logMsg(`${c.ic} ${c.nm}: KOŠ! +${c.pts} (${Math.round(p*100)}%${tag})`,'hit');
      animScore('you');ptsPopup('+'+c.pts,'#2ecc71','left');
      burstSparks(); screenFlash(momAtShot>=85?'fire':'gold');
      if(G.combo>=2) comboFlash(G.combo);
      if(royalGuaranteed){ /* momentum ostane */ }
      else G.momentum = momAtShot>=55 ? Math.round(momAtShot*0.7) : Math.round(momAtShot*0.4);
      const ye=$('you-pts');if(ye)ye.textContent=G.youScore;
      if(c.foul&&chance(c.foul)){G.oppFauls++;logMsg('😤 In faul! Bonus prosti met.','info');shakeArena();}
      checkWin();
      // KOŠ konča napad → žoga nasprotniku
      if(!G.over){ renderBattle(); setTimeout(()=>startPossession('opp'),1100); }
    }
    else{
      logMsg(`${c.ic} ${c.nm}: ZGREŠIL (${Math.round(p*100)}%)`,'miss');G.combo=0;
      G.momentum=Math.round(momAtShot*0.25);
      // ZGREŠEN MET → priložnost za napadalni skok (vsakič težji)
      offerRebound();
    }
  },450);
}

/* napadalni skok — vsak zaporedni je težji (−15% vsakič). 
   bazna šansa odvisna od obrambnega bonusa cone (a tu si v napadu, zato samo padajoča). */
function offerRebound(){
  const baseReb=0.45;
  const reb=clamp(baseReb - G.reboundCount*0.15, 0.05, baseReb);
  G._rebChance=reb;
  renderBattle();
}
/* igralec poskusi skok */
function tryRebound(){
  const reb=G._rebChance||0;
  shakeArena();
  if(chance(reb)){
    G.reboundCount++; G.hasRebound=true; G.shotTaken=false; G._rebChance=0;
    logMsg(`🔁 NAPADALNI SKOK! Nova priložnost (skok ${G.reboundCount}×).`,'hit');
    animScore('you');
    renderBattle();
  } else {
    G._rebChance=0;
    logMsg('🔁 Skok izgubljen — žoga nasprotniku.','miss');
    renderBattle();
    setTimeout(()=>startPossession('opp'),900);
  }
}
/* igralec se odpove skoku → konec napada */
function skipRebound(){
  G._rebChance=0;
  logMsg('Napad končan — žoga nasprotniku.','info');
  setTimeout(()=>startPossession('opp'),500);
}

function unprepDefense(i){
  const id=G.defPrep[i]; if(!id)return; const c=CARD_DEFS[id];
  G.energy+=c.cost; G.defPrep.splice(i,1);
  logMsg(`↩ ${c.nm} umaknjena iz priprave.`,'');
  renderBattle();
}
function setDefSystem(k){
  // zamenjava sistema med napadom stane 1 energijo (razen prve izbire)
  if(G.defSystem && G.defSystem!==k){
    if(G.energy<1){ toast('Menjava sistema stane 1⚡'); return; }
    G.energy-=1; logMsg(`🔄 Zamenjal obrambni sistem (−1⚡).`,'');
  }
  G.defSystem=k;
  renderBattle();
}
function endPossession(){if(G.over)return;startPossession(G.possession==='you'?'opp':'you');}

/* ============================================================
   AI NAPAD — na poteze, čaka NEOMEJENO na igralčevo obrambo
   Potek: AI pripravi napad iz svojega vzorca → pokaže namero
   → igralec izbere obrambno karto (ali Pusti) → klikne razreši
   ============================================================ */
function oppPossession(){
  if(G.over)return;
  G.energy=G.maxEnergy; G._react=[];
  G.oppReboundCount=0; // koliko skokov je nasprotnik že naredil to posest
  prepareOppAttack();
}
function prepareOppAttack(){
  if(G.over)return;
  // izberi potezo iz vzorca nasprotnika
  const pat=G.opp.pattern;
  const move=pat[G.oppStep % pat.length]; G.oppStep++;
  const three=(move==='met3');
  const drive=(move==='prodor');
  // nasprotnik gradi momentum z gibanjem (prodor največ); trojka unovči največ momentuma
  if(drive) addMom('opp',16); else addMom('opp',8);
  G.pendingAttack={move, three, drive, pts:three?3:2, momAtShot:G.oppMom};
  G._react=[]; // ponastavi obrambo za ta napad
  renderOppTurn();
}
/* render obrambne poteze (čaka igralca) */
function renderOppTurn(){
  const a=G.pendingAttack;
  const sys=DEF_SYSTEMS[G.defSystem||'osebna'];
  // učinek sistema proti tej nameri
  let sysEffect='';
  if(a.drive) sysEffect = sys.vsDrive<0?`✅ ${sys.nm} duši prodor (${Math.round(sys.vsDrive*100)}%)`:`⚠️ ${sys.nm} slaba proti prodoru (+${Math.round(sys.vsDrive*100)}%)`;
  else if(a.three) sysEffect = sys.vs3<0?`✅ ${sys.nm} pokriva trojko (${Math.round(sys.vs3*100)}%)`:`⚠️ ${sys.nm} pušča trojko (+${Math.round(sys.vs3*100)}%)`;
  else sysEffect = `${sys.ic} ${sys.nm}`;

  const intentTxt = (G.oppReboundCount>0?'🔁 po skoku — ':'')+(a.three?'meri za 3 🎯 (3 točke)':a.drive?'prodira pod koš ⚡ (2 + faul)':'meče za 2 🏀 (2 točki)');
  // pripravljene obrambne karte (iz defPrep)
  const prepped = G.defPrep.map(id=>CARD_DEFS[id]);
  const preppedHtml = prepped.length
    ? prepped.map((c,i)=>`<div class="card ${c.type} ${G._react.includes(i)?'chosen':''}" ${rarAttr(G.defPrep[i])} onclick="toggleDefense(${i})">${cardInner(G.defPrep[i],1)}</div>`).join('')
    : '<div class="muted" style="padding:14px;font-size:13px">Nisi pripravil obrambnih kart med napadom. Lahko le izbereš sistem zgoraj.</div>';
  const chosen=G._react.map(i=>prepped[i]).filter(Boolean);
  const chosenTxt=chosen.length?`Sprožil boš: ${chosen.map(c=>c.ic+' '+c.nm).join(', ')}`:(prepped.length?'Klikni pripravljeno karto za sprožitev.':'');

  const phaseBanner=`<div class="phase-banner defense">${icn('defense')} OBRAMBA · ${icn(sys.svg)} ${sys.short}</div>`;

  screen.innerHTML=`<div class="screen oppturn">
    <div class="bf-left">
      ${phaseBanner}
      ${arenaHtml()}
      ${scoreboardHtml()}
      ${momHtml('opp')}
    </div>
    <div class="bf-right">
      <div class="intent pulse"><b>${G.opp.nm}</b> ${intentTxt}
        <div style="font-size:12px;margin-top:6px;color:${sysEffect.startsWith('✅')?'var(--green)':sysEffect.startsWith('⚠️')?'var(--red)':'var(--muted)'}">${sysEffect}</div></div>
      <div class="dp-sys" style="margin:8px 0">${Object.entries(DEF_SYSTEMS).map(([k,s])=>`<button class="sys-btn ${G.defSystem===k?'on':''}" onclick="switchDefMidAttack('${k}')">${icn(s.svg)} ${s.short}</button>`).join('')}</div>
      <div class="center muted" style="font-size:12px;margin-bottom:4px">${chosenTxt}</div>
      <div class="hand">${preppedHtml}</div>
      <div class="end-poss btn-row" style="margin-top:10px">
        <button class="btn red" onclick="resolveOppAttack()">${chosen.length?'🛡 Brani se!':'Pusti met →'}</button>
      </div>
      <div class="log">${G.log.join('')||''}</div>
    </div>
  </div>`;
}
/* preklopi pripravljeno obrambno karto za sprožitev */
function toggleDefense(i){
  const pos=G._react.indexOf(i);
  if(pos>=0) G._react.splice(pos,1); else G._react.push(i);
  renderOppTurn();
}
/* zamenjava sistema tik pred metom (med obrambo) stane prosti met nasprotniku — abstraktno: doda mu +6 momentuma */
function switchDefMidAttack(k){
  if(G.defSystem===k)return;
  G.defSystem=k; addMom('opp',6);
  logMsg(`🔄 Zamenjal sistem v zadnjem hipu (${DEF_SYSTEMS[k].nm}) — nasprotnik dobi rahlo prednost.`,'');
  renderOppTurn();
}
function resolveOppAttack(){
  if(G.over)return;
  const a=G.pendingAttack;
  const sys=DEF_SYSTEMS[G.defSystem||'osebna'];
  // sprožene pripravljene karte
  const firedIdx=G._react.slice().sort((x,y)=>x-y);
  const reactIds=firedIdx.map(i=>G.defPrep[i]).filter(Boolean);
  // porabi sprožene karte iz defPrep
  firedIdx.slice().sort((x,y)=>y-x).forEach(i=>{G.discard.push(G.defPrep[i]);G.defPrep.splice(i,1);});
  G._react=[];

  let blocked=false,stolen=false;
  // SISTEM + karta: prodor težje blokiraš, sistem doda modifikatorje
  const blockMod=a.drive?-0.20:0;
  const stealMod=(a.drive?0.10:0)+sys.stealBonus;
  if(reactIds.includes('blokada')&&chance(clamp(CARD_DEFS.blokada.blockChance+blockMod,0.1,0.9)))blocked=true;
  if(!blocked&&reactIds.includes('kraja')&&chance(clamp(CARD_DEFS.kraja.stealChance+stealMod,0.1,0.9)))stolen=true;

  if(reactIds.includes('kradljivec')){
    const grab=G.oppMom; addMom('you',grab); G.oppMom=0;
    logMsg(`🪞 Kradljivec! Ukradel si ${grab} momentuma!`,'hit'); shakeArena(); a.momAtShot=0;
  }
  if(reactIds.includes('zmrzni')){
    const before=G.oppMom; G.oppMom=Math.round(G.oppMom*0.5);
    logMsg(`❄️ Zmrzni ritem! ${G.opp.nm} ohlajen (${before}→${G.oppMom}).`,'hit'); a.momAtShot=G.oppMom;
  }

  if(stolen){
    logMsg('✋ KRAJA! Ukradel si žogo → protinapad!','hit');animScore('you');shakeArena();screenFlash('blue');
    G.fastBreak=true; G.pendingAttack=null;
    setTimeout(()=>startPossession('you'),800); return;
  }
  if(blocked){
    logMsg(`🛡 BLOKADA! Ustavil si ${G.opp.nm} — žoga tebi!`,'hit');animScore('you');shakeArena();screenFlash('blue');
    G.pendingAttack=null;
    setTimeout(()=>startPossession('you'),900); return;
  }
  // nasprotnik meče — momentum + SISTEMSKI modifikator glede na vrsto meta
  const momA=(a.momAtShot!=null?a.momAtShot:G.oppMom);
  const sysMod = a.three ? sys.vs3 : a.drive ? sys.vsDrive : 0;
  let p=clamp(G.opp.atk+momBonus(momA)+(a.three?-0.18:a.drive?0.05:0)+sysMod-0.02,0.05,0.95);
  animShoot('opp');
  setTimeout(()=>{
    if(chance(p)){
      G.oppScore+=a.pts;logMsg(`${G.opp.nm} zadel ${a.three?'trojko':a.drive?'prodor':'met'}! +${a.pts}`,'miss');
      animScore('opp');ptsPopup('+'+a.pts,'#ff4d6d','right');
      G.oppMom = momA>=55 ? Math.round(momA*0.7) : Math.round(momA*0.4);
      if(a.drive&&chance(0.25)){G.youFauls++;logMsg('😣 Naredil si osebno napako!','miss');
        if(G.youFauls>=6){logMsg('🚫 6 napak — izključen!','miss');}}
      const oe=$('opp-pts');if(oe)oe.textContent=G.oppScore;
      G.pendingAttack=null; checkWin();
      // KOŠ → žoga tebi
      if(!G.over) setTimeout(()=>startPossession('you'),1000);
    } else {
      logMsg(`${G.opp.nm} zgrešil ${a.three?'trojko':'met'}.`,'hit');
      G.oppMom=Math.round(momA*0.25);
      G.pendingAttack=null;
      // ZGREŠEN MET → nasprotnikov napadalni skok (tvoja CONA mu zmanjša šanso)
      oppTryRebound();
    }
  },450);
}

/* nasprotnikov napadalni skok — vsak težji; tvoja cona (reboundBonus) mu odšteje šanso */
function oppTryRebound(){
  const sys=DEF_SYSTEMS[G.defSystem||'osebna'];
  const baseReb=0.40;
  // tvoj reboundBonus (cona +0.15) zmanjša NASPROTNIKOV skok
  const reb=clamp(baseReb - G.oppReboundCount*0.15 - sys.reboundBonus, 0.03, baseReb);
  setTimeout(()=>{
    if(chance(reb)){
      G.oppReboundCount++;
      logMsg(`🔁 ${G.opp.nm} ujame napadalni skok (${Math.round(reb*100)}%)! Nova priložnost.`,'miss');
      shakeArena();
      setTimeout(prepareOppAttack,800);
    } else {
      const sysNote = sys.reboundBonus>0 ? ` (${sys.ic} ${sys.nm} ti je pomagala)` : '';
      logMsg(`🔁 Pobral si odbito žogo${sysNote} — žoga tebi!`,'hit');
      animScore('you');
      setTimeout(()=>startPossession('you'),900);
    }
  },700);
}

function checkWin(){if(G.over)return;
  if(G.youScore>=G.target){G.over=true;setTimeout(winBattle,700);}
  else if(G.oppScore>=G.target){G.over=true;setTimeout(loseBattle,700);}}

function winBattle(){
  RUN.wins++;RUN.nodeIdx++;
  if(RUN.nodeIdx>=OPPONENTS.length){
    screen.innerHTML=`<div class="screen center" style="padding-top:40px">
      <div style="font-size:60px">🏆</div><h1 class="big" style="color:var(--gold);margin:14px 0">KRALJ IGRIŠČA!</h1>
      <img src="assets/hero.png" style="width:160px;height:160px;filter:drop-shadow(0 0 24px rgba(255,209,102,.7))">
      <div class="muted" style="margin:14px 0 26px">Premagal si vse 3 nasprotnike!</div>
      <button class="btn gold" onclick="showTitle()">▶ Nov turnir</button></div>`;
    return;
  }
  showReward();
}
function showReward(){
  // 3 sloti, vsak svoja redkost po utežeh; boss zmaga doda možnost legendarne
  const picks=[]; const used=new Set();
  const bossBeaten = G.opp && G.opp.boss;
  for(let i=0;i<3;i++){
    let rar=rollRarity();
    // prvi slot po porazu bossa lahko postane legendaren (40%)
    if(i===0 && bossBeaten && chance(0.4)) rar='legendarna';
    const pool = rar==='legendarna' ? ['vognju'] : REWARD_BY_RARITY[rar];
    const avail=pool.filter(id=>!used.has(id));
    let id = avail.length?avail[Math.floor(Math.random()*avail.length)]
                         :REWARD_BY_RARITY.navadna.filter(x=>!used.has(x))[0];
    if(!id) id='met';
    used.add(id); picks.push(id);
  }
  const cards=picks.map(id=>{const c=CARD_DEFS[id];const rar=c.rarity||'navadna';const rs=RARITY_STYLE[rar];
    const leg=rar==='legendarna'?'leg':'';
    const rlbl = rar!=='navadna' ? `<div style="position:absolute;top:0;left:0;right:0;text-align:center;font-size:8px;font-weight:bold;letter-spacing:1.5px;color:#fff;background:${rs.col};padding:2px 0;z-index:5;text-shadow:0 1px 1px rgba(0,0,0,.6)">${rs.lbl}</div>` : '';
    return `<div class="card ${c.type} ${leg}" ${rarAttr(id)} onclick="takeReward('${id}')">
      ${cardInner(id,1)}${rlbl}
    </div>`;}).join('');
  screen.innerHTML=`<div class="screen center">
    <div style="font-size:46px;margin-top:16px">✅</div><h2 style="color:var(--green);margin:8px 0">Zmaga!</h2>
    <div class="muted" style="margin-bottom:4px">Izberi 1 karto v svoj dek:</div>
    <div class="reward-cards" style="margin-bottom:28px">${cards}</div>
    <button class="btn" onclick="skipReward()">Preskoči</button></div>`;
}
function takeReward(id){RUN.deck.push(id);toast(`➕ ${CARD_DEFS[id].nm} dodana!`);setTimeout(showMap,500);}
function skipReward(){showMap();}
function loseBattle(){
  screen.innerHTML=`<div class="screen center" style="padding-top:40px">
    <div style="font-size:60px">💀</div><h1 class="big" style="color:var(--red);margin:14px 0">PORAZ</h1>
    <div class="muted" style="margin-bottom:6px">${G.opp.nm} te je premagal ${G.oppScore}:${G.youScore}.</div>
    <div class="muted" style="margin-bottom:26px">Prišel si do ${RUN.wins}/3 zmag.</div>
    <button class="btn gold" onclick="showTitle()">▶ Poskusi znova</button></div>`;
}

showTitle();
</script>
</body>
</html>
